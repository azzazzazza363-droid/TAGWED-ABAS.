<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>سجل حضور دورة التجويد</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f4f4f4; }
        .btn { width: 90%; padding: 15px; margin: 5px; color: white; border: none; font-size: 18px; cursor: pointer; border-radius: 5px; }
        .btn-green { background-color: #28a745; }
        .btn-blue { background-color: #007bff; }
        .btn-purple { background-color: #6f42c1; }
        table { border-collapse: collapse; width: 95%; margin: 20px auto; background: white; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        thead { background-color: #343a40; color: white; }
        .high { background-color: #7cfc00 !important; }
        .low { background-color: #ff6347 !important; }
    </style>
</head>
<body>
    <h1>سجل حضور طلاب دورة التجويد</h1>
    <h3>الأسبوع الحالي: <span id="sessionDisplay">1</span></h3>

    <button class="btn btn-green" onclick="startScanner()">📷 مسح الباركود</button>
    <button class="btn btn-blue" onclick="saveAndAdvance()">💾 حفظ الحضور وقفل الخانات</button>
    <button class="btn btn-purple" onclick="calculateAndColor()">📊 حساب النسب المئوية</button>

    <div id="reader" style="width: 300px; margin: auto;"></div>

    <table id="attendanceTable">
        <thead>
            <tr id="headerRow">
                <th>الرقم</th><th>الاسم</th><th>6/7</th><th>13/7</th><th>20/7</th><th>27/7</th><th>3/8</th><th>10/8</th><th>17/8</th><th>24/8</th><th>31/8</th><th>7/9</th><th>14/9</th><th>21/9</th><th>النسبة %</th>
            </tr>
        </thead>
        <tbody id="studentBody"></tbody>
    </table>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script>
        const studentNames = ["سمير منافخي", "الشيخ أبوعمر", "شادي خلف", "محمد عطية", "مجد روغوظ", "عبد اللطيف حافظ", "طارق آغا", "معاذ حميدو", "علي ابراهيم", "سامر فياض", "حسن عبد النبي", "عامر ابراهيم", "خير الدين خلوف", "محمد علي محيي الدين", "أبوعمار الحمصي", "صفوان سهيل محمد", "نادر اسماعيل طاش", "ياسين محمد غنوم", "وليد علي مطر", "محمد خير المسعود", "محمد خالد اليوسفي", "محي الدين وائلي", "مصطفى وجود", "أيمن صالح مطر", "جاسم صلان", "محمد ضامن", "وسام اسماعيل جاموس", "عادل الحمد", "عدنان الحمود", "محي ابراهيم", "حسين حنبا", "محمد الخطيب", "سعد دايات", "ابراهيم شقير", "ملهم أبوخلف", "محمد خالد طويلة", "عبد الرحمن محي الدين", "عبادة محي الدين", "زين الدين عرقور", "عبد الرحمن بلعوط", "أيهم مصطفى", "محمد العزاوي", "سعود ملا عبدالله", "أسامة العبيد", "محمد مازن عوض", "براء عليكو", "حسن ازفسلي", "كنان جمعة", "محمد الهيبشي", "إحسان سوف", "محمد الإبراهيم", "حسين عيد", "علي عمرو", "محمد مراد", "طارق مراد"];
        
        let currentSession = parseInt(localStorage.getItem('currentSession') || "1");
        document.getElementById('sessionDisplay').innerText = currentSession;

        const tbody = document.getElementById('studentBody');
        for (let i = 0; i < studentNames.length; i++) {
            let row = `<tr><td>${i + 1}</td><td>${studentNames[i]}</td>`;
            for (let s = 1; s <= 12; s++) row += `<td><input type="checkbox" id="check-${i+1}-${s}" disabled></td>`;
            row += `<td id="percent-${i+1}">0%</td></tr>`;
            tbody.innerHTML += row;
        }

        document.querySelectorAll(`input[id$="-${currentSession}"]`).forEach(cb => cb.disabled = false);

        function startScanner() {
            const scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 200 });
            scanner.render((text) => {
                const cb = document.getElementById(`check-${text}-${currentSession}`);
                if (cb) { cb.checked = true; alert("تم تسجيل الطالب: " + studentNames[text-1]); scanner.clear(); }
            });
        }

        function saveAndAdvance() {
            document.querySelectorAll(`input[id$="-${currentSession}"]`).forEach(cb => cb.disabled = true);
            currentSession++;
            localStorage.setItem('currentSession', currentSession);
            document.getElementById('sessionDisplay').innerText = currentSession;
            document.querySelectorAll(`input[id$="-${currentSession}"]`).forEach(cb => cb.disabled = false);
        }

        function calculateAndColor() {
            for (let i = 1; i <= studentNames.length; i++) {
                let attended = 0;
                for (let s = 1; s <= 12; s++) if (document.getElementById(`check-${i}-${s}`).checked) attended++;
                let percent = (attended / (currentSession - 1 || 1)) * 100;
                let cell = document.getElementById(`percent-${i}`);
                cell.innerText = percent.toFixed(0) + "%";
                cell.className = (percent >= 75) ? "high" : "low";
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سجل حضور دورة التجويد</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f4f4f4; padding: 10px; }
        .btn { width: 100%; padding: 15px; margin: 5px 0; color: white; border: none; font-size: 18px; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .btn-green { background-color: #28a745; }
        .btn-blue { background-color: #007bff; }
        .btn-purple { background-color: #6f42c1; }
        .btn-orange { background-color: #fd7e14; }
        table { border-collapse: collapse; width: 100%; margin-top: 15px; background: white; font-size: 14px; }
        th, td { border: 1px solid #999; padding: 8px; text-align: center; }
        thead { background-color: #343a40; color: white; }
        .high { background-color: #7cfc00 !important; font-weight: bold; }
        .low { background-color: #ff6347 !important; font-weight: bold; }
    </style>
</head>
<body>
    <h1>سجل حضور دورة التجويد</h1>
    <h3>الجلسة الحالية: <span id="sessionDisplay">1</span></h3>

    <button class="btn btn-green" onclick="startScanner()">📷 مسح الباركود</button>
    <button class="btn btn-blue" onclick="saveAndLock()">💾 حفظ الحضور وقفل الخانة</button>
    <button class="btn btn-orange" onclick="exportToExcel()">📊 تصدير Excel</button>
    <button class="btn btn-purple" onclick="calculatePercents()">📈 النسبة المئوية</button>

    <div id="reader" style="width: 100%; max-width: 400px; margin: auto;"></div>

    <table id="attendanceTable">
        <thead>
            <tr id="headerRow"><th>الرقم</th><th>اسم الطالب</th></tr>
        </thead>
        <tbody id="studentBody"></tbody>
    </table>

    <script>
        const students = [
            { id: 1, name: "سمير منافخي" }, { id: 2, name: "الشيخ أبوعمر" }, { id: 3, name: "شادي خلف" }, { id: 4, name: "محمد عطية" }, { id: 5, name: "مجد روغوظ" }, { id: 6, name: "عبد اللطيف حافظ" }, { id: 7, name: "طارق آغا" }, { id: 8, name: "معاذ حميدو" }, { id: 9, name: "علي ابراهيم" }, { id: 10, name: "سامر فياض" }, { id: 11, name: "حسن عبد النبي" }, { id: 12, name: "عامر ابراهيم" }, { id: 13, name: "خير الدين خلوف" }, { id: 14, name: "علي الصومالي" }, { id: 15, name: "أبوعمار الحمصي" }, { id: 16, name: "صفوان سهيل محمد" }, { id: 17, name: "نادر اسماعيل طاش" }, { id: 18, name: "ياسين محمد غنوم" }, { id: 19, name: "وليد علي مطر" }, { id: 20, name: "محمد خير المسعود" }, { id: 21, name: "محمد خالد اليوسفي" }, { id: 22, name: "محي الدين وائلي" }, { id: 23, name: "مصطفى وجود" }, { id: 24, name: "أيمن صالح مطر" }, { id: 25, name: "جاسم صلان" }, { id: 26, name: "محمد ضامن" }, { id: 27, name: "وسام اسماعيل جاموس" }, { id: 28, name: "عادل الحمد" }, { id: 29, name: "عدنان الحمود" }, { id: 30, name: "قصي ابراهيم" }, { id: 31, name: "حسين جندا" }, { id: 32, name: "محمد الخطيب" }, { id: 33, name: "سعد دايات" }, { id: 34, name: "ابراهيم شقير" }, { id: 35, name: "ملهم أبوخلف" }, { id: 36, name: "محمد خالد طويلة" }, { id: 37, name: "عبد الرحمن محي الدين" }, { id: 38, name: "عبادة محي الدين" }, { id: 39, name: "زين الدين عرعور" }, { id: 40, name: "عبد الرحمن بلعوط" }, { id: 41, name: "أيهم مصطفى" }, { id: 42, name: "محمد العزاوي" }, { id: 43, name: "سعود ملا عبدالله" }, { id: 44, name: "ياسين شموط" }, { id: 45, name: "محمد مازن عوض" }, { id: 46, name: "براء عليكو" }, { id: 47, name: "حسن ازفسلي" }, { id: 48, name: "كنان جمعة" }, { id: 49, name: "محمد الهيبشي" }, { id: 50, name: "إحسان سوسق" }, { id: 51, name: "محمد الإبراهيم" }, { id: 52, name: "حسين عيد" }, { id: 53, name: "علي عمرو" }, { id: 54, name: "محمد مراد" }, { id: 55, name: "جهاد ابو عجاج" }, { id: 56, name: "محمد الصيصي" }, { id: 57, name: "طارق مراد" }, { id: 58, name: "ضياء عليكو" }, { id: 59, name: "محمد خير العلبي" }, { id: 60, name: "احمد الشاعر" }, { id: 61, name: "احمد بدر الدين الصالح" }, { id: 62, name: "نورس غيرلي" }, { id: 63, name: "عدنان قابلو" }, { id: 64, name: "زين العابدين حسين" }, { id: 65, name: "محمد اشقر" }, { id: 66, name: "ابراهيم العباس" }, { id: 67, name: "محمد شتيوي" }, { id: 68, name: "عمر فواز جمعة" }, { id: 69, name: "محمد حماش" } ];
        
        const dates = ["29/6", "6/7", "13/7", "20/7", "27/7", "3/8", "10/8", "17/8", "24/8", "31/8", "7/9", "14/9", "21/9", "28/9", "5/10", "12/10", "19/10"];
        
        // localStorage.clear();
        function loadAttendance() {
    document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        const savedState = localStorage.getItem(cb.id);
        if (savedState !== null) {
            cb.checked = (savedState === 'true');
        }
    });
}
        let currentSession = 1;
        document.getElementById('sessionDisplay').innerText = currentSession;

        const headerRow = document.getElementById('headerRow');
        dates.forEach(d => headerRow.innerHTML += `<th>${d}</th>`);
        headerRow.innerHTML += `<th>النسبة</th>`;

        const tbody = document.getElementById('studentBody');
        students.forEach(student => {
            let row = `<tr><td>${student.id}</td><td style="text-align:right">${student.name}</td>`;
            for (let s = 1; s <= 17; s++) {
                let disabled = (s != currentSession) ? 'disabled' : '';
                row += `<td><input type="checkbox" id="check-${student.id}-${s}" ${disabled} onchange="localStorage.setItem(this.id, this.checked)"></td>`;
            }
            row += `<td id="percent-${student.id}">-</td></tr>`;
            tbody.innerHTML += row;
        });
        loadAttendance();

        function startScanner() {
            const scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 200 });
            scanner.render((text) => {
                const match = text.match(/(\d+)/);
                if (!match) return;
                const scannedId = parseInt(match[0]);
                const cb = document.getElementById(`check-${scannedId}-${currentSession}`);
                if (cb) {
                    cb.checked = true;
                    alert("✅ تم تسجيل حضور الطالب رقم: " + scannedId);
                    scanner.clear();
                } else {
                    alert("❌ خطأ: الطالب رقم " + scannedId + " غير موجود أو غير مفعل في هذه الجلسة.");
                    scanner.clear();
                }
            });
        }

        function saveAndLock() {
            if (currentSession > 17) { alert("انتهت الدورة!"); return; }
            document.querySelectorAll(`input[id$="-${currentSession}"]`).forEach(cb => cb.disabled = true);
            currentSession++;
            document.getElementById('sessionDisplay').innerText = currentSession;
            document.querySelectorAll(`input[id$="-${currentSession}"]`).forEach(cb => cb.disabled = false);
            alert("تم حفظ الجلسة والانتقال للجلسة القادمة!");
        }

        function calculatePercents() {
            for (let i = 1; i <= students.length; i++) {
                let attended = 0;
                for (let s = 1; s <= 17; s++) if (document.getElementById(`check-${i}-${s}`)?.checked) attended++;
                let percent = (attended / (currentSession - 1 || 1)) * 100;
                let cell = document.getElementById(`percent-${i}`);
                cell.innerText = percent.toFixed(0) + "%";
                cell.className = (percent >= 75) ? "high" : "low";
            }
        }

        function exportToExcel() {
            const wb = XLSX.utils.table_to_book(document.getElementById("attendanceTable"));
            XLSX.writeFile(wb, "سجل_حضور_دورة_التجويد.xlsx");
        }
    </script>
</body>
</html>
